version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: ecom-dashboard-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecom_dashboard
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecom_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
